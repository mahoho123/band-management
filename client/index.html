    <!-- Login skeleton: shown instantly before JS loads, removed once React mounts -->
    <div id="login-skeleton" aria-hidden="true">
      <div id="login-skeleton-card">
        <div id="login-skeleton-tabs">
          <span>👤 成員登入</span>
          <span>👑 主管登入</span>
        </div>
        <div class="sk-row"><div class="sk-avatar"></div><div class="sk-line"></div></div>
        <div class="sk-row"><div class="sk-avatar"></div><div class="sk-line"></div></div>
        <div class="sk-row"><div class="sk-avatar"></div><div class="sk-line"></div></div>
        <button class="sk-btn" disabled>載入中…</button>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Remove skeleton once React has mounted (first paint of #root)
      (function(){
        var ob=new MutationObserver(function(){
          var r=document.getElementById('root');
          if(r&&r.children.length>0){
            var sk=document.getElementById('login-skeleton');
            if(sk){sk.style.transition='opacity .15s';sk.style.opacity='0';setTimeout(function(){sk&&sk.remove()},160);}
            ob.disconnect();
          }
        });
        ob.observe(document.getElementById('root')||document.body,{childList:true,subtree:true});
      })();
    </script>
